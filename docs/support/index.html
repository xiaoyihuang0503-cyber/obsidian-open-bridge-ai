<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support Open Bridge</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f5;
      --text: #1f2328;
      --muted: #667085;
      --card: #ffffff;
      --border: #e4e7ec;
      --accent: #5b5bd6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111214;
        --text: #f3f4f6;
        --muted: #a1a1aa;
        --card: #1b1d21;
        --border: #2b2f36;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    main {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0 72px;
    }
    header {
      max-width: 720px;
      margin-bottom: 32px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 5vw, 56px);
      letter-spacing: 0;
      line-height: 1.05;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      align-items: start;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(16, 24, 40, 0.06);
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 20px;
      letter-spacing: 0;
    }
    .qr {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      display: block;
      background: white;
    }
    .note {
      margin-top: 28px;
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: color-mix(in srgb, var(--card) 88%, transparent);
      color: var(--muted);
      font-size: 15px;
    }
    a { color: var(--accent); }
    @media (max-width: 760px) {
      main { padding-top: 36px; }
      .grid { grid-template-columns: 1fr; }
      p { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Support Open Bridge</h1>
      <p>
        Open Bridge is an independent Obsidian plugin for contextual AI work.
        If it saves you time, a small contribution helps keep it moving.
      </p>
    </header>

    <section class="grid" aria-label="Donation QR codes">
      <article class="card">
        <h2>WeChat Pay</h2>
        <img class="qr" src="../assets/wechat-qr.png" alt="WeChat Pay QR code for Hsiao Evan">
      </article>
      <article class="card">
        <h2>Alipay</h2>
        <img class="qr" src="../assets/alipay-qr.png" alt="Alipay QR code for Hsiao Evan">
      </article>
    </section>

    <div class="note">
      Name shown on the payment screens: <strong>Hsiao Evan</strong>.
      These QR images are privacy-masked for public release.
    </div>
  </main>
</body>
</html>
